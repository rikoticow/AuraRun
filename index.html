<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuraRun</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Biblioteca PeerJS para o Multiplayer P2P -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <!-- Biblioteca Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #8c2332;
            --mg-color: #631621;
            --fg-color: #000000;
            --accent: #ffeb3b;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Arial Black', Impact, sans-serif;
            text-transform: uppercase;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        .screen-half {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
            border-bottom: 6px solid var(--fg-color);
            background-color: var(--bg-color);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .score-display {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 32px;
            color: var(--fg-color);
            text-shadow: 2px 2px 0px rgba(255,255,255,0.3);
            letter-spacing: 2px;
            transition: color 0.2s, text-shadow 0.2s;
        }

        .player-label {
            position: absolute;
            top: 15px; left: 20px;
            font-size: 24px;
            color: var(--bg-color);
            background: var(--fg-color);
            padding: 5px 15px;
            border-radius: 4px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .game-over-text {
            font-size: 48px;
            color: #ff3333;
            text-shadow: 4px 4px 0px var(--fg-color);
            display: none;
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .game-over-text.show {
            display: block;
            transform: scale(1);
        }

        .countdown-text {
            font-size: 100px;
            color: white;
            text-shadow: 6px 6px 0px var(--fg-color);
            position: absolute;
            z-index: 10;
            display: none;
        }

        /* --- MENUS E INTERFACE --- */
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
            transition: opacity 0.3s;
        }

        .menu-box {
            background: var(--bg-color);
            color: white;
            padding: 40px;
            border-radius: 8px;
            border: 6px solid var(--fg-color);
            box-shadow: 10px 10px 0px var(--fg-color);
            max-width: 500px;
            width: 90%;
            display: none;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .menu-box.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        h1 { margin-top: 0; font-size: 48px; color: white; text-shadow: 4px 4px 0px var(--fg-color); letter-spacing: 2px;}
        h2 { font-size: 28px; text-shadow: 2px 2px 0px var(--fg-color); }

        input[type="text"], select, input[type="color"] {
            width: calc(100% - 20px);
            padding: 12px;
            font-size: 18px;
            margin: 10px 0;
            background: rgba(255,255,255,0.9);
            border: 4px solid var(--fg-color);
            border-radius: 4px;
            font-family: 'Arial Black', Impact, sans-serif;
            cursor: pointer;
        }

        input[type="color"] { height: 50px; padding: 2px; }

        button {
            padding: 15px 20px;
            font-size: 22px;
            background-color: var(--fg-color);
            color: white;
            border: 4px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 5px;
            transition: 0.1s;
            text-transform: uppercase;
            font-family: 'Arial Black', Impact, sans-serif;
            width: 100%;
            box-shadow: 0px 6px 0px rgba(0,0,0,0.5);
        }

        button:hover { background-color: #222; transform: translateY(-2px); }
        button:active { transform: translateY(4px); box-shadow: 0px 2px 0px rgba(0,0,0,0.5); }

        button.ready-btn { background-color: #2e7d32; }
        button.ready-btn.is-ready { background-color: #555; color: #aaa; }
        button.cancel-btn { background-color: #444; font-size: 16px; margin-top: 20px; border-color: #111; }

        .id-display {
            background: var(--fg-color); color: var(--accent);
            padding: 15px; font-size: 28px; border-radius: 4px;
            letter-spacing: 4px; cursor: pointer;
            border: 2px dashed var(--accent); margin: 10px 0;
        }

        /* LOBBY */
        .lobby-players {
            display: flex; justify-content: space-between;
            gap: 20px; margin-bottom: 20px;
        }
        .player-card {
            flex: 1; background: rgba(0,0,0,0.5);
            padding: 15px; border-radius: 8px; border: 3px solid #444;
        }
        .player-card h3 { margin: 0 0 10px 0; }
        .status-badge {
            display: inline-block; padding: 5px 10px;
            background: #d32f2f; border-radius: 4px;
            font-size: 14px; margin-top: 10px;
        }
        .status-badge.ready { background: #388e3c; }

        /* MODO SOLO */
        #game-container.solo-mode #p2-screen { display: none; }
        #game-container.solo-mode #p1-screen { border-bottom: none; }

        /* HIGHSCORES */
        .score-list { text-align: left; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; margin-bottom: 15px; max-height: 180px; overflow-y: auto;}
        .score-item { display: flex; justify-content: space-between; font-size: 18px; border-bottom: 2px solid #444; padding: 8px 0;}
        .score-item:last-child { border-bottom: none; }
        .score-name { color: var(--accent); }
        .score-val { color: white; }

    </style>
</head>
<body>

<div id="game-container">
    <div id="p1-screen" class="screen-half">
        <canvas id="canvas-p1"></canvas>
        <div class="ui-layer">
            <div id="p1-label" class="player-label">P1</div>
            <div class="score-display"><span id="score-p1">00000</span></div>
            <div id="gameover-p1" class="game-over-text">DESTRUÍDO!</div>
            <div id="countdown-p1" class="countdown-text">3</div>
        </div>
    </div>
    <div id="p2-screen" class="screen-half">
        <canvas id="canvas-p2"></canvas>
        <div class="ui-layer">
            <div id="p2-label" class="player-label">P2</div>
            <div class="score-display"><span id="score-p2">00000</span></div>
            <div id="gameover-p2" class="game-over-text">DESTRUÍDO!</div>
            <div id="countdown-p2" class="countdown-text">3</div>
        </div>
    </div>
</div>

<div id="menu-overlay">
    <!-- Menu Inicial -->
    <div id="menu-main" class="menu-box active">
        <h1>AuraRun</h1>
        <p>Corrida Industrial Mortal</p>
        <button onclick="startSolo()">MODO SOLO</button>
        <button onclick="hostGame()">CRIAR SALA (HOST)</button>
        <button onclick="showJoinMenu()">ENTRAR EM SALA</button>
        <button onclick="showHighScores()" style="background-color: #555;">VER RECORDES</button>
    </div>

    <!-- Menu Join -->
    <div id="menu-client" class="menu-box">
        <h2>CONECTAR</h2>
        <input type="text" id="join-id-input" placeholder="CÓDIGO DA SALA" autocomplete="off">
        <button onclick="joinGame()">ENTRAR</button>
        <button onclick="backToMain()" style="background-color: #555;">VOLTAR</button>
        <p id="client-status" style="color: var(--accent);"></p>
    </div>

    <!-- LOBBY -->
    <div id="menu-lobby" class="menu-box">
        <h2>SALA DE PREPARAÇÃO</h2>
        <div id="host-id-container" style="display:none;">
            <p style="margin:5px 0; font-size:12px;">CÓDIGO PARA O AMIGO:</p>
            <div class="id-display" id="my-peer-id" onclick="copyId()">GERANDO...</div>
        </div>
        
        <div class="lobby-players">
            <div class="player-card">
                <h3>VOCÊ</h3>
                <label>Cor:</label>
                <input type="color" id="local-color" value="#000000" onchange="updateCustomization()">
                <label>Chapéu:</label>
                <select id="local-hat" onchange="updateCustomization()">
                    <option value="none">Nenhum</option>
                    <option value="cap">Boné</option>
                    <option value="tophat">Cartola</option>
                    <option value="crown">Coroa</option>
                    <option value="bandana">Bandana</option>
                    <option value="helmet">Capacete</option>
                    <option value="wizard">Mago</option>
                    <option value="cowboy">Cowboy</option>
                    <option value="horns">Chifres</option>
                </select>
                <div id="local-status" class="status-badge">ESPERANDO</div>
            </div>
            
            <div class="player-card" id="remote-player-card">
                <h3>OPONENTE</h3>
                <div style="height: 50px; background: #222; margin: 10px 0; border:2px solid #000;" id="remote-color-display"></div>
                <div id="remote-hat-display" style="font-size: 14px; background: #333; padding: 5px;">Chapéu: ?</div>
                <div id="remote-status" class="status-badge">CONECTANDO...</div>
            </div>
        </div>

        <button id="btn-ready" class="ready-btn" onclick="toggleReady()" disabled>PRONTO</button>
        <button class="cancel-btn" onclick="leaveLobby()">VOLTAR AO MENU</button>
    </div>

    <!-- Menu Highscores -->
    <div id="menu-highscores" class="menu-box">
        <h2>RECORDES</h2>
        <h3 style="margin-bottom: 5px;">MODO SOLO</h3>
        <div id="list-scores-solo" class="score-list"></div>
        <h3 style="margin-bottom: 5px;">MULTIPLAYER</h3>
        <div id="list-scores-multi" class="score-list"></div>
        <button class="cancel-btn" onclick="backToMain()">VOLTAR</button>
    </div>

    <!-- Fim de Jogo -->
    <div id="menu-winner" class="menu-box">
        <h1 id="winner-msg">FIM DE JOGO</h1>
        
        <div id="score-save-container" style="margin: 20px 0; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border: 2px solid #444;">
            <p style="margin: 0 0 10px 0; font-size: 18px;">PONTOS: <span id="final-score-display" style="color: var(--accent); font-size: 24px;">0</span></p>
            <input type="text" id="player-name-input" placeholder="SEU NOME" maxlength="10" style="text-align: center; width: 80%;">
            <button id="btn-save-score" onclick="saveCurrentScore()" style="font-size: 16px; padding: 10px; width: 80%;">SALVAR RECORDE</button>
            <p id="save-status-msg" style="display:none; color: var(--accent); margin-top: 10px; font-size: 20px;">SALVO!</p>
        </div>

        <button id="btn-restart" style="display:none;" onclick="returnToLobby()">NOVA PARTIDA</button>
        <button class="cancel-btn" onclick="leaveLobby()">SAIR PARA O MENU</button>
        <p id="wait-host-msg" style="display:none; color: #aaa;">Aguardando o Host...</p>
    </div>
</div>

<script>
    /**
     * AuraRun - Motor e Lógica
     */
    const GRAVITY = 0.65;
    const JUMP_POWER = -12;
    const INITIAL_SPEED = 7;
    const SPEED_INCREMENT = 0.0015;
    const MAX_SPEED = 18;
    
    let gameState = 'MENU';
    let animationFrameId;

    let peer = null;
    let conn = null;
    let isHost = false;
    let localGame = null;
    let remoteGame = null;
    let isSolo = false;

    let currentFinalScore = 0;
    let scoreSaved = false;

    let pLocalState = { ready: false, color: '#000000', hat: 'none' };
    let pRemoteState = { ready: false, color: '#000000', hat: 'none' };

    const COLORS = { bg: '#8c2332', mg: '#631621', fg: '#000000' };

    // --- SISTEMA DE ÁUDIO NATIVO ---
    let audioCtx = null;
    let bgmInterval = null;
    let bgmStep = 0;
    const melody = [110, 0, 110, 0, 164, 0, 146, 146, 110, 0, 110, 0, 196, 164, 146, 130];
    
    // SFX em Loop da Plataforma
    let platformSfxInterval = null;
    let platStep = 0;
    // Notas agudas que harmonizam com a melodia principal (Lá Menor Pentatônica)
    const platNotes = [880, 1046, 1318, 1568];

    function initAudio() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSelect() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playJump() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function playSlide() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function playFastFall() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(500, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function playHit() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function playCrushDrop() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    function playPlatformLand() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function startPlatformSFX() {
        if(!audioCtx || platformSfxInterval) return;
        platformSfxInterval = setInterval(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(platNotes[platStep % platNotes.length], audioCtx.currentTime);
            platStep++;
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime); // Som subtil
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }, 100);
    }

    function stopPlatformSFX() {
        if(platformSfxInterval) {
            clearInterval(platformSfxInterval);
            platformSfxInterval = null;
        }
    }

    function playBGM() {
        if(!audioCtx) return;
        stopBGM();
        bgmInterval = setInterval(() => {
            const freq = melody[bgmStep % melody.length];
            if(freq > 0) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                osc.type = 'sawtooth';
                osc.frequency.value = freq;
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            }
            bgmStep++;
        }, 150);
    }

    function stopBGM() { 
        if(bgmInterval) clearInterval(bgmInterval); 
        stopPlatformSFX(); 
    }

    // --- SPRITES DOS CHAPÉUS ---
    function drawHatSprite(ctx, hat) {
        if(hat === 'none') return;
        if(hat === 'cap') {
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(0, -8, 16, 8); 
            ctx.fillRect(8, -4, 18, 4); 
        } else if (hat === 'tophat') {
            ctx.fillStyle = '#111';
            ctx.fillRect(-4, -4, 26, 4); 
            ctx.fillRect(2, -20, 14, 16); 
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(2, -8, 14, 4); 
        } else if (hat === 'crown') {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(-4, -12); ctx.lineTo(4, -6);
            ctx.lineTo(11, -14); ctx.lineTo(18, -6); ctx.lineTo(26, -12);
            ctx.lineTo(22, 0); ctx.fill();
        } else if (hat === 'bandana') {
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(0, 4, 22, 6);
            ctx.fillRect(-10, 4, 10, 4); 
        } else if (hat === 'helmet') {
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath(); ctx.arc(10, -2, 12, Math.PI, 0); ctx.fill();
            ctx.fillRect(-4, -4, 28, 4); 
        } else if (hat === 'wizard') {
            ctx.fillStyle = '#3f51b5';
            ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(24, 0); ctx.lineTo(10, -25); ctx.fill();
            ctx.fillStyle = '#ffeb3b';
            ctx.fillRect(-4, -4, 28, 4); 
        } else if (hat === 'cowboy') {
            ctx.fillStyle = '#8d6e63';
            ctx.fillRect(-8, -4, 36, 4); 
            ctx.fillRect(2, -15, 16, 11); 
        } else if (hat === 'horns') {
            ctx.fillStyle = '#f5f5f5';
            ctx.beginPath(); ctx.moveTo(4, 0); ctx.quadraticCurveTo(-5, -10, 5, -15); ctx.lineTo(8, 0); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(16, 0); ctx.quadraticCurveTo(25, -10, 15, -15); ctx.lineTo(12, 0); ctx.fill(); 
        }
    }

    // --- CLASSES ---
    class Particle {
        constructor(x, y, color, speedX, speedY, life, size) {
            this.x = x; this.y = y; this.color = color;
            this.vx = speedX; this.vy = speedY;
            this.life = life; this.maxLife = life;
            this.size = size;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.life--; this.size *= 0.95;
        }
        draw(ctx) {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1.0;
        }
    }

    class FlyingHat {
        constructor(x, y, hatType) {
            this.x = x; this.y = y; this.hat = hatType;
            this.vx = (Math.random() > 0.5 ? 1 : -1) * (5 + Math.random() * 5);
            this.vy = -10 - Math.random() * 6;
            this.rot = 0;
            this.vrot = (Math.random() > 0.5 ? 1 : -1) * (0.2 + Math.random() * 0.3);
        }
        update() {
            this.x += this.vx; 
            this.y += this.vy;
            this.vy += GRAVITY * 0.8;
            this.rot += this.vrot;
        }
        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rot);
            drawHatSprite(ctx, this.hat);
            ctx.restore();
        }
    }

    class BackgroundElement {
        constructor(x, floorY, speedMult) {
            this.x = x; this.yFloor = floorY; this.speedMult = speedMult;
            this.type = Math.floor(Math.random() * 3);
            this.width = 50 + Math.random() * 100;
            this.height = 100 + Math.random() * 150;
        }
        update(gameSpeed) { this.x -= gameSpeed * this.speedMult; }
        draw(ctx) {
            ctx.fillStyle = COLORS.mg;
            if (this.type === 0) {
                ctx.beginPath(); ctx.arc(this.x + this.width/2, this.yFloor - this.height + 20, this.width/2, Math.PI, 0);
                ctx.fillRect(this.x, this.yFloor - this.height + 20, this.width, this.height - 20); ctx.fill();
            } else if (this.type === 1) {
                ctx.fillRect(this.x + this.width*0.2, this.yFloor - this.height, this.width*0.6, this.height);
                ctx.fillRect(this.x + this.width*0.1, this.yFloor - this.height, this.width*0.8, 10);
            } else {
                ctx.fillRect(this.x, this.yFloor - this.height, this.width, this.height);
                ctx.fillStyle = COLORS.bg;
                ctx.fillRect(this.x + 10, this.yFloor - this.height + 20, this.width - 20, 30);
                ctx.fillRect(this.x + 10, this.yFloor - this.height + 70, this.width - 20, 30);
            }
        }
    }

    class Platform {
        constructor(canvasWidth, floorY) {
            this.width = 400 + Math.random() * 300; // Mais longa
            this.height = 15;
            this.x = canvasWidth;
            // Muito mais alta, exige um pulo duplo (no limite do ápice)
            this.y = floorY - 185 - Math.random() * 20; 
            this.markedForDeletion = false;
            this.type = 'plat';
            this.isSteppedOn = false; // Novo estado para saber se o dino está nela
        }
        update(speed) { this.x -= speed; if (this.x + this.width < 0) this.markedForDeletion = true; }
        draw(ctx) {
            ctx.save(); // Guarda o contexto para os efeitos de brilho não passarem para os outros desenhos
            
            if (this.isSteppedOn) {
                ctx.fillStyle = '#ffff00'; // Fica totalmente amarela
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = 15; // Brilho neon
            } else {
                ctx.fillStyle = COLORS.fg; // Cor normal preta
            }
            
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            ctx.shadowBlur = 0; // Remove o brilho para desenhar a estrutura

            // Ponto Amarelo Vivo no início e no fim (apenas se a plataforma não estiver toda amarela)
            if (!this.isSteppedOn) {
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(this.x, this.y, 15, this.height); 
                ctx.fillRect(this.x + this.width - 15, this.y, 15, this.height); 
            }

            // Estética estrutural abaixo da plataforma
            ctx.strokeStyle = this.isSteppedOn ? '#ffff00' : COLORS.bg;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for(let i=0; i<this.width-10; i+=20) {
                ctx.moveTo(this.x + i, this.y);
                ctx.lineTo(this.x + i + 10, this.y + this.height);
                ctx.moveTo(this.x + i + 20, this.y);
                ctx.lineTo(this.x + i + 10, this.y + this.height);
            }
            ctx.stroke();
            
            ctx.restore(); // Restaura o contexto
        }
    }

    class Dino {
        constructor() {
            this.width = 40; this.height = 46;
            this.x = 120; // Movido mais pra frente para melhor visão de obstáculos
            this.y = 0; 
            this.baseFloor = 0; this.yFloor = 0;
            this.vy = 0; 
            this.isJumping = false; this.isDead = false; 
            this.isSliding = false; this.slideTimer = 0;
            this.jumps = 0; // Para contar o Pulo Duplo
            this.scaleX = 1; this.scaleY = 1;
            this.color = '#000000'; this.hat = 'none';
            this.currentRot = 0; this.deadRot = 0;
        }

        setBaseFloor(floorY) {
            this.baseFloor = floorY;
            this.yFloor = floorY;
            if (!this.isJumping && !this.isDead) this.y = this.yFloor;
        }

        getHitbox() {
            if (this.isSliding) {
                return { x: this.x + 8, y: this.y - 20, w: this.width - 16, h: 20 };
            }
            return { x: this.x + 8, y: this.y - this.height + 8, w: this.width - 20, h: this.height - 16 };
        }

        jump(inst) {
            if (!this.isDead && gameState === 'PLAYING') {
                if (this.jumps < 2) {
                    this.vy = JUMP_POWER; 
                    this.isJumping = true;
                    this.isSliding = false; // Cancela o slide se pular
                    this.slideTimer = 0;
                    this.jumps++;
                    this.scaleX = 0.6; this.scaleY = 1.4;
                    inst.addParticles(this.x + this.width/2, this.y, 10, COLORS.fg);
                    playJump();
                }
            }
        }

        slide(inst) {
            if (!this.isDead && gameState === 'PLAYING') {
                if (this.slideTimer === 0) { // Só ativa se não estiver deslizando
                    this.slideTimer = 25; // Slide mais curto e ágil (20 frames)
                    
                    // Efeito Juicy Visual na entrada do slide
                    this.scaleX = 1.5; 
                    this.scaleY = 0.5;
                    // Impulso de fumaça atrás
                    inst.addParticles(this.x + this.width, this.y - 10, 8, 'rgba(255, 255, 255, 0.8)');
                    
                    if (this.y < this.yFloor) {
                        this.vy = 18; // Impulso brusco e forte para baixo (Fast Fall)
                        playFastFall();
                    } else if (this.yFloor < this.baseFloor) {
                        // Atravessa a plataforma se estiver em cima dela
                        this.yFloor = this.baseFloor;
                        this.y += 5; // Descola da plataforma para não haver engate imediato
                        this.vy = 12; // Drop rápido
                        this.isJumping = true;
                        playFastFall();
                    } else {
                        playSlide(); // Som de derrapagem no chão
                    }
                }
            }
        }

        update(inst) {
            if (this.isDead) return;

            // Timer do Slide fixo
            if (this.slideTimer > 0) {
                this.slideTimer--;
                this.isSliding = true;
                
                // Faíscas contínuas se estiver no chão deslizando
                if (this.y >= this.yFloor && Math.random() > 0.2) {
                    inst.addParticles(this.x + this.width/2 + 10, this.y, 1, '#ffff00');
                    inst.addParticles(this.x - 5, this.y, 1, '#ffaa00');
                }
            } else {
                this.isSliding = false;
            }

            // Lógica de colisão com Plataformas
            let targetFloor = this.baseFloor;
            for (let p of inst.platforms) {
                p.isSteppedOn = false; // Reseta o estado da plataforma
                let dinoLeft = this.x;
                let dinoRight = this.x + this.width;
                let platLeft = p.x;
                let platRight = p.x + p.width;

                if (dinoRight > platLeft && dinoLeft < platRight) {
                    if (this.isSliding) continue; // Ignora a plataforma se estiver deslizando/caindo rápido para a atravessar

                    if (this.y <= p.y + 15 && this.y + this.vy >= p.y) {
                        targetFloor = p.y;
                        p.isSteppedOn = true; // Activa a cor amarela
                        break;
                    }
                    if (this.yFloor === p.y && this.y === p.y) {
                        targetFloor = p.y;
                        p.isSteppedOn = true; // Mantém a cor amarela enquanto corre em cima
                        break;
                    }
                }
            }
            this.yFloor = targetFloor;

            this.y += this.vy;
            this.vy += GRAVITY;

            // Cai um pouco mais rápido enquanto escorrega e adiciona rastro
            if (this.isSliding && this.y < this.yFloor) {
                this.vy += 1.5;
                // Efeito de rastro (vento) caindo rápido
                inst.addParticles(this.x + this.width/2 + (Math.random()-0.5)*20, this.y - this.height/2, 2, 'rgba(255, 255, 255, 0.7)');
            }

            this.scaleX += (1 - this.scaleX) * 0.15;
            this.scaleY += (1 - this.scaleY) * 0.15;

            // Aterrissagem
            if (this.y >= this.yFloor) {
                let justLanded = (this.isJumping || this.vy > 10);
                if(justLanded) {
                    if (this.isSliding) {
                        this.scaleX = 1.6; this.scaleY = 0.4; // Squash violento
                        inst.addParticles(this.x + this.width/2, this.y, 15, '#ffeb3b'); // Explosão de faíscas ao bater no chão
                        inst.shake(8, 12);
                    } else if (this.isJumping) {
                        this.scaleX = 1.4; this.scaleY = 0.6;
                        inst.addParticles(this.x + this.width/2, this.y, 5, COLORS.fg);
                        inst.shake(3, 8);
                    }
                    
                    // SFX de plataforma (impacto inicial) se o chão atual for mais alto que o chão base
                    if (this.yFloor < this.baseFloor) {
                        playPlatformLand();
                    }

                    this.isJumping = false;
                    this.jumps = 0; // Reseta pulos
                }
                this.y = this.yFloor; 
                this.vy = 0; 
            } else {
                this.isJumping = true; 
            }

            if (!this.isJumping && !this.isSliding && Math.random() > 0.8 && gameState === 'PLAYING') {
                inst.addParticles(this.x, this.y, 1, COLORS.fg);
            }
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x + this.width/2, this.y);
            if(this.isDead && this.currentRot) {
                ctx.translate(0, -this.height/2);
                ctx.rotate(this.currentRot);
                ctx.translate(0, this.height/2);
            }
            ctx.scale(this.scaleX, this.scaleY);
            
            ctx.fillStyle = this.color === '#000000' ? COLORS.fg : this.color;
            let drawW = this.width; let drawH = this.height;

            if (this.isSliding && !this.isDead && !this.isJumping) {
                // Corpo escorregando
                ctx.fillRect(-drawW/2 - 10, -20, drawW + 16, 16); 
                ctx.fillRect(drawW/2 + 2, -16, 16, 12); 
                ctx.fillStyle = COLORS.bg;
                ctx.fillRect(drawW/2 + 10, -14, 4, 4); 
            } else {
                // Corpo Normal
                ctx.fillRect(-drawW/2 + 6, -drawH, drawW - 12, drawH);
                ctx.fillRect(-drawW/2, -drawH + 10, 8, 14);
                ctx.fillRect(drawW/2 - 16, -drawH - 4, 22, 18);
                
                ctx.fillStyle = this.isDead ? '#fff' : COLORS.bg;
                if(this.isDead) {
                    ctx.fillRect(drawW/2 - 4, -drawH + 2, 6, 2);
                    ctx.fillRect(drawW/2 - 2, -drawH, 2, 6);
                } else {
                    ctx.fillRect(drawW/2 - 4, -drawH + 2, 4, 4);
                }

                ctx.fillStyle = COLORS.fg;
                let runOffset = (!this.isJumping && !this.isDead && Math.floor(Date.now() / 100) % 2 === 0) ? 4 : 0;
                if(this.isJumping || this.isDead) {
                    ctx.fillRect(-drawW/2 + 10, -6, 6, 6);
                    ctx.fillRect(drawW/2 - 14, -8, 6, 6);
                } else {
                    ctx.fillRect(-drawW/2 + 10, -runOffset, 6, 6+runOffset);
                    ctx.fillRect(drawW/2 - 14, -(4-runOffset), 6, 6+(4-runOffset));
                }
            }

            if(!this.isDead) {
                ctx.save();
                if (this.isSliding && !this.isJumping) {
                    ctx.translate(drawW/2 + 2, -16);
                } else {
                    ctx.translate(drawW/2 - 16, -drawH - 4);
                }
                drawHatSprite(ctx, this.hat);
                ctx.restore();
            }

            ctx.restore();
        }
    }

    class Crusher {
        constructor(canvasWidth, floorY) {
            this.width = 50 + Math.random() * 30;
            this.x = canvasWidth;
            this.yBase = floorY; 
            this.markedForDeletion = false;
            this.type = 'crusher';
            this.dropOffset = 0;
            this.isDropping = false;
            this.hasDropped = false;
        }
        update(speed) { 
            this.x -= speed; 
            if (this.x + this.width < 0) this.markedForDeletion = true; 
            
            // Animação brutal de queda
            if (this.isDropping) {
                this.dropOffset += 15; 
                if (this.dropOffset >= 35) {
                    this.dropOffset = 35; // Limita no chão
                }
            }
        }
        getHitbox() { 
            // O Esmagador para a 35px do chão. O Slide (20px alt) passa tranquilo.
            return { x: this.x + 5, y: -1000, w: this.width - 10, h: 1000 + this.yBase - 35 + this.dropOffset }; 
        }
        draw(ctx) {
            let actualY = this.yBase - 35 + this.dropOffset;

            ctx.fillStyle = COLORS.fg;
            // Parede gigante caindo do teto
            ctx.fillRect(this.x, actualY - 800, this.width, 800);
            
            ctx.strokeStyle = COLORS.bg; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(this.x, actualY - 10); ctx.lineTo(this.x + this.width, actualY - 10);
            ctx.stroke();
            
            ctx.fillStyle = COLORS.fg;
            for(let i=0; i<this.width; i+=12) {
                ctx.beginPath();
                ctx.moveTo(this.x + i, actualY);
                ctx.lineTo(this.x + i + 6, actualY);
                ctx.lineTo(this.x + i + 3, actualY + 8);
                ctx.fill();
            }
        }
    }

    class Obstacle {
        constructor(canvasWidth, floorY) {
            this.width = 30 + Math.random() * 30; this.height = 40 + Math.random() * 40;
            this.x = canvasWidth; this.y = floorY; this.markedForDeletion = false;
            this.pattern = Math.floor(Math.random() * 3); 
            this.type = 'obs';
        }
        update(speed) { this.x -= speed; if (this.x + this.width < 0) this.markedForDeletion = true; }
        getHitbox() { return { x: this.x + 5, y: this.y - this.height + 5, w: this.width - 10, h: this.height - 10 }; }
        draw(ctx) {
            ctx.fillStyle = COLORS.fg; ctx.strokeStyle = COLORS.bg; ctx.lineWidth = 2;
            if(this.pattern === 0) {
                ctx.fillRect(this.x, this.y - this.height, this.width, this.height);
                ctx.beginPath(); ctx.moveTo(this.x, this.y - this.height); ctx.lineTo(this.x + this.width, this.y);
                ctx.moveTo(this.x + this.width, this.y - this.height); ctx.lineTo(this.x, this.y); ctx.stroke();
            } else if (this.pattern === 1) {
                ctx.fillRect(this.x, this.y - this.height, this.width, 10);
                ctx.fillRect(this.x + this.width/2 - 5, this.y - this.height, 10, this.height);
                ctx.fillRect(this.x, this.y - 10, this.width, 10);
            } else {
                ctx.fillRect(this.x, this.y - this.height, 10, this.height);
                ctx.fillRect(this.x + this.width - 10, this.y - this.height * 0.7, 10, this.height * 0.7);
            }
        }
    }

    class Drone {
        constructor(canvasWidth, floorY) {
            this.width = 36; this.height = 20;
            this.x = canvasWidth; this.markedForDeletion = false;
            this.type = 'drone';
            this.altitude = Math.random() > 0.5 ? 0 : 1;
            this.yBase = this.altitude === 0 ? floorY - 65 : floorY - 25;
            this.y = this.yBase;
            this.hoverOffset = Math.random() * Math.PI * 2;
        }
        update(speed) {
            this.x -= speed * 1.15; 
            this.y = this.yBase + Math.sin(Date.now() / 150 + this.hoverOffset) * 5;
            if (this.x + this.width < 0) this.markedForDeletion = true;
        }
        getHitbox() { return { x: this.x + 8, y: this.y - 16, w: 20, h: 12 }; }
        draw(ctx) {
            ctx.fillStyle = COLORS.fg;
            ctx.fillRect(this.x + 8, this.y - 16, 20, 12);
            ctx.fillRect(this.x, this.y - 10, 36, 4);
            if (Math.floor(Date.now() / 50) % 2 === 0) {
                ctx.fillRect(this.x - 2, this.y - 18, 8, 2); ctx.fillRect(this.x + 30, this.y - 18, 8, 2);
            } else {
                ctx.fillRect(this.x + 2, this.y - 18, 4, 2); ctx.fillRect(this.x + 30, this.y - 18, 4, 2);
            }
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(this.x + 16, this.y - 12, 4, 4);
        }
    }

    class GameInstance {
        constructor(canvasId, scoreId, gameOverId, countId) {
            this.canvas = document.getElementById(canvasId);
            this.ctx = this.canvas.getContext('2d');
            this.scoreEl = document.getElementById(scoreId);
            this.gameOverEl = document.getElementById(gameOverId);
            this.countEl = document.getElementById(countId);
            
            this.dino = new Dino();
            this.obstacles = [];
            this.platforms = [];
            this.bgElements = [];
            this.particles = [];
            this.flyingHats = [];
            
            this.score = 0; this.gameSpeed = INITIAL_SPEED; 
            this.obstacleTimer = 0; this.platformTimer = 0;
            this.shakeIntensity = 0; this.shakeFrames = 0;

            this.resize();
        }

        resize() {
            const parent = this.canvas.parentElement;
            this.canvas.width = parent.clientWidth;
            this.canvas.height = parent.clientHeight;
            this.dino.setBaseFloor(this.canvas.height - (this.canvas.height * 0.15));
        }

        reset() {
            this.obstacles = []; this.particles = []; this.flyingHats = []; this.platforms = [];
            this.score = 0; this.gameSpeed = INITIAL_SPEED; this.obstacleTimer = 0; this.platformTimer = 0;
            this.dino.isDead = false; this.dino.isSliding = false; this.dino.slideTimer = 0;
            this.dino.y = this.dino.baseFloor; this.dino.yFloor = this.dino.baseFloor; this.dino.vy = 0;
            this.dino.scaleX = 1; this.dino.scaleY = 1; this.dino.currentRot = 0; this.dino.jumps = 0;
            this.updateScoreDisplay();
            this.gameOverEl.classList.remove('show');
            this.countEl.style.display = 'none';

            this.bgElements = [];
            for(let i=0; i<5; i++) this.bgElements.push(new BackgroundElement(Math.random() * this.canvas.width, this.dino.baseFloor, 0.3));
        }

        shake(intensity, frames) { this.shakeIntensity = intensity; this.shakeFrames = frames; }

        addParticles(x, y, count, color) {
            for(let i=0; i<count; i++) {
                this.particles.push(new Particle(
                    x + (Math.random()-0.5)*10, y + (Math.random()-0.5)*10, color,
                    (Math.random()-0.5)*4 - this.gameSpeed*0.2, (Math.random()-0.5)*4 - 2,
                    15 + Math.random()*15, 4 + Math.random()*4
                ));
            }
        }

        updateScoreDisplay() { 
            this.scoreEl.innerText = Math.floor(this.score).toString().padStart(5, '0'); 
            if (this.dino.yFloor < this.dino.baseFloor) {
                this.scoreEl.style.color = '#ffff00'; // Amarelo Vivo Brilhante
                this.scoreEl.style.textShadow = '0px 0px 10px rgba(255, 255, 0, 0.8)';
            } else {
                this.scoreEl.style.color = 'var(--fg-color)';
                this.scoreEl.style.textShadow = '2px 2px 0px rgba(255,255,255,0.3)';
            }
        }

        checkCollision(obs) {
            if (obs.type === 'plat') return false; 
            const hitDino = this.dino.getHitbox();
            const hitObs = obs.getHitbox();
            return (hitDino.x < hitObs.x + hitObs.w && hitDino.x + hitDino.w > hitObs.x && hitDino.y < hitObs.y + hitObs.h && hitDino.y + hitDino.h > hitObs.y);
        }

        updateVisuals() {
            if (!this.dino.isDead) {
                this.bgElements.forEach(bg => bg.update(this.gameSpeed));
                if(Math.random() < 0.02) this.bgElements.push(new BackgroundElement(this.canvas.width, this.dino.baseFloor, 0.3));
                this.bgElements = this.bgElements.filter(bg => bg.x + bg.width > 0);
            }

            this.particles.forEach(p => p.update());
            this.particles = this.particles.filter(p => p.life > 0);

            this.flyingHats.forEach(h => h.update());
            this.flyingHats = this.flyingHats.filter(h => h.y < this.canvas.height + 50);

            if (this.dino.isDead) {
                this.dino.y += this.dino.vy;
                this.dino.vy += GRAVITY;
                if (this.dino.currentRot > this.dino.deadRot) this.dino.currentRot -= 0.15;
                if (this.dino.y >= this.dino.yFloor) {
                    this.dino.y = this.dino.yFloor;
                    this.dino.vy = 0;
                }
            }
        }

        updateLocal() {
            if (this.gameSpeed < MAX_SPEED && !this.dino.isDead) this.gameSpeed += SPEED_INCREMENT;
            
            if (!this.dino.isDead) {
                let oldScore = Math.floor(this.score);
                // Pontos x2 em Plataformas
                let multiplier = (this.dino.yFloor < this.dino.baseFloor) ? 2 : 1;
                this.score += 0.05 * this.gameSpeed * multiplier;
                if (Math.floor(this.score) > oldScore) this.updateScoreDisplay();
            }

            this.updateVisuals();
            this.dino.update(this);

            if (this.dino.isDead) return;

            // Spawn Plataformas
            this.platformTimer++;
            const platSpawnRate = 60 + (Math.random() * 100) * (INITIAL_SPEED / this.gameSpeed); 
            if (this.platformTimer > platSpawnRate * 3) {
                if (Math.random() < 0.6) {
                    this.platforms.push(new Platform(this.canvas.width, this.dino.baseFloor));
                }
                this.platformTimer = 0;
            }
            this.platforms.forEach(p => p.update(this.gameSpeed));
            this.platforms = this.platforms.filter(p => !p.markedForDeletion);

            // Spawn Inimigos Mortais
            this.obstacleTimer++;
            const spawnRate = 70 + (Math.random() * 150) * (INITIAL_SPEED / this.gameSpeed); 
            if (this.obstacleTimer > spawnRate) {
                let rand = Math.random();
                if (this.score > 1000 && rand < 0.25) {
                    this.obstacles.push(new Drone(this.canvas.width, this.dino.baseFloor));
                } else if (this.score > 500 && rand < 0.45) { // Aparece a partir de 500pts
                    this.obstacles.push(new Crusher(this.canvas.width, this.dino.baseFloor));
                } else {
                    this.obstacles.push(new Obstacle(this.canvas.width, this.dino.baseFloor));
                }
                this.obstacleTimer = 0;
            }

            this.obstacles.forEach(obs => {
                obs.update(this.gameSpeed);
                
                // --- Lógica Especial para o Crusher Cair ---
                if (obs.type === 'crusher') {
                    if (!obs.hasDropped && !obs.isDropping) {
                        // Se o dino passar do meio do crusher, ele desaba
                        if (this.dino.x > obs.x + obs.width - 20) { 
                            obs.isDropping = true;
                        }
                    }
                    if (obs.isDropping && obs.dropOffset >= 35) {
                        obs.isDropping = false;
                        obs.hasDropped = true;
                        this.shake(12, 8); // Camerashake violento da pancada
                        this.addParticles(obs.x + obs.width/2, this.dino.baseFloor, 20, '#ffff00'); // Faiscas do esmagador no chao
                        playCrushDrop();
                    }
                }

                if (this.checkCollision(obs)) {
                    this.dino.isDead = true;
                    this.dino.vy = -6; 
                    this.dino.deadRot = -Math.PI / 2; 
                    this.dino.currentRot = 0;
                    
                    if (this.dino.hat !== 'none') {
                        this.flyingHats.push(new FlyingHat(this.dino.x + this.dino.width/2 - 16, this.dino.y - this.dino.height, this.dino.hat));
                        this.dino.hat = 'none'; 
                    }
                    this.shake(25, 25); 
                    this.addParticles(this.dino.x + 20, this.dino.y - 20, 50, '#ff3333'); 
                    this.gameOverEl.classList.add('show');
                    playHit();
                }
            });
            this.obstacles = this.obstacles.filter(obs => !obs.markedForDeletion);
        }

        draw() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            this.ctx.save();
            if(this.shakeFrames > 0) {
                this.ctx.translate((Math.random() - 0.5) * this.shakeIntensity, (Math.random() - 0.5) * this.shakeIntensity);
                this.shakeFrames--;
            }

            this.bgElements.forEach(bg => bg.draw(this.ctx));

            this.ctx.fillStyle = COLORS.fg;
            this.ctx.fillRect(0, this.dino.baseFloor, this.canvas.width, this.canvas.height - this.dino.baseFloor);
            
            let floorOffset = - (this.score * 5 % 40);
            for(let i=0; i<this.canvas.width/40 + 1; i++) this.ctx.fillRect(floorOffset + i*40, this.dino.baseFloor, 20, 10);

            this.platforms.forEach(p => p.draw(this.ctx));
            this.obstacles.forEach(obs => obs.draw(this.ctx));
            this.particles.forEach(p => p.draw(this.ctx));
            this.flyingHats.forEach(h => h.draw(this.ctx));
            this.dino.draw(this.ctx);

            this.ctx.restore();
        }
    }

    const gameP1 = new GameInstance('canvas-p1', 'score-p1', 'gameover-p1', 'countdown-p1');
    const gameP2 = new GameInstance('canvas-p2', 'score-p2', 'gameover-p2', 'countdown-p2');

    // --- Sincronização ---
    function getLocalGameState() {
        return {
            dyOffset: localGame.dino.baseFloor - localGame.dino.y, 
            dd: localGame.dino.isDead, dj: localGame.dino.isJumping, sl: localGame.dino.isSliding,
            sc: localGame.score, sx: localGame.dino.scaleX, sy: localGame.dino.scaleY,
            obs: localGame.obstacles.map(o => ({ 
                x: Math.round(o.x), w: Math.round(o.width), h: Math.round(o.height), 
                p: o.pattern, t: o.type, ho: o.hoverOffset, alt: o.altitude, do: o.dropOffset
            })),
            plats: localGame.platforms.map(p => ({
                x: Math.round(p.x), yOff: Math.round(localGame.dino.baseFloor - p.y), w: Math.round(p.width), act: p.isSteppedOn
            }))
        };
    }

    function applyRemoteState(data) {
        if(!remoteGame) return;
        
        if(!remoteGame.dino.isDead) {
            remoteGame.dino.y = remoteGame.dino.baseFloor - data.dyOffset;
            remoteGame.dino.isJumping = data.dj;
            remoteGame.dino.isSliding = data.sl;
            remoteGame.dino.scaleX = data.sx;
            remoteGame.dino.scaleY = data.sy;
        }
        
        if(data.dd && !remoteGame.dino.isDead) {
            remoteGame.dino.isDead = true;
            remoteGame.dino.vy = -6;
            remoteGame.dino.currentRot = 0;
            remoteGame.dino.deadRot = -Math.PI / 2;
            
            if (remoteGame.dino.hat !== 'none') {
                remoteGame.flyingHats.push(new FlyingHat(remoteGame.dino.x + remoteGame.dino.width/2 - 16, remoteGame.dino.y - remoteGame.dino.height, remoteGame.dino.hat));
                remoteGame.dino.hat = 'none';
            }
            remoteGame.gameOverEl.classList.add('show');
            remoteGame.shake(25, 25);
            remoteGame.addParticles(remoteGame.dino.x + 20, remoteGame.dino.y - 20, 50, '#ff3333');
            playHit();
        }

        remoteGame.score = data.sc;
        
        remoteGame.obstacles = data.obs.map(o => {
            if (o.t === 'drone') {
                let drone = new Drone(0, remoteGame.dino.baseFloor);
                drone.x = o.x; drone.altitude = o.alt;
                drone.yBase = drone.altitude === 0 ? remoteGame.dino.baseFloor - 65 : remoteGame.dino.baseFloor - 25;
                drone.hoverOffset = o.ho; 
                drone.y = drone.yBase + Math.sin(Date.now() / 150 + drone.hoverOffset) * 5;
                return drone;
            } else if (o.t === 'crusher') {
                let crusher = new Crusher(0, remoteGame.dino.baseFloor);
                crusher.x = o.x; crusher.width = o.w; 
                crusher.dropOffset = o.do || 0;
                return crusher;
            } else {
                let obs = new Obstacle(0, remoteGame.dino.baseFloor);
                obs.x = o.x; obs.y = remoteGame.dino.baseFloor; obs.width = o.w; obs.height = o.h; obs.pattern = o.p; 
                return obs;
            }
        });

        remoteGame.platforms = data.plats ? data.plats.map(p => {
            let plat = new Platform(0, remoteGame.dino.baseFloor);
            plat.x = p.x; plat.y = remoteGame.dino.baseFloor - p.yOff; plat.width = p.w; 
            plat.isSteppedOn = p.act; // Sincroniza a cor da plataforma remotamente
            return plat;
        }) : [];

        if(!remoteGame.dino.isDead) {
            remoteGame.dino.yFloor = data.dyOffset > 10 ? (remoteGame.dino.baseFloor - data.dyOffset) : remoteGame.dino.baseFloor; 
        }
        remoteGame.updateScoreDisplay();
    }

    // --- Loop Principal ---
    function gameLoop() {
        if (gameState === 'PLAYING' || gameState === 'GAMEOVER') {
            if(localGame) {
                localGame.updateLocal();
                
                // Lógica do SFX Contínuo da Plataforma
                if (gameState === 'PLAYING' && localGame.dino.yFloor < localGame.dino.baseFloor && !localGame.dino.isDead) {
                    startPlatformSFX();
                } else {
                    stopPlatformSFX();
                }
            }

            if (gameState === 'PLAYING' && !isSolo && conn && conn.open && localGame) {
                conn.send({ type: 'STATE', state: getLocalGameState() });
            }

            if (!isSolo && remoteGame) {
                remoteGame.updateVisuals();
            }

            if (gameState === 'PLAYING') {
                if (isSolo) {
                    if (gameP1.dino.isDead) { gameState = 'GAMEOVER'; handleGameOver(); }
                } else {
                    if (gameP1.dino.isDead && gameP2.dino.isDead) { gameState = 'GAMEOVER'; handleGameOver(); }
                }
            }
        }

        gameP1.draw();
        if(!isSolo) gameP2.draw();

        animationFrameId = requestAnimationFrame(gameLoop);
    }

    function switchMenu(menuId) {
        document.querySelectorAll('.menu-box').forEach(el => el.classList.remove('active'));
        if(menuId) {
            document.getElementById('menu-overlay').style.display = 'flex';
            document.getElementById(menuId).classList.add('active');
        } else {
            document.getElementById('menu-overlay').style.display = 'none';
        }
    }

    // --- SISTEMA DE HIGHSCORES (SUPABASE) ---
    const supabaseUrl = 'https://vyinpkopysyzyfgwyajj.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5aW5wa29weXN5enlmZ3d5YWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTkyNzMsImV4cCI6MjA4NzQzNTI3M30.S1iA4KlTOKmmMrxtBobVxnc38oGSmJRCKzx6bSx7JSQ';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function renderHighScores() {
        const renderList = async (mode, elementId) => {
            const container = document.getElementById(elementId);
            container.innerHTML = '<div style="text-align:center; color:#888; padding: 10px;">CARREGANDO...</div>';
            
            const { data, error } = await supabaseClient
                .from('highscores')
                .select('*')
                .eq('mode', mode)
                .order('score', { ascending: false })
                .limit(5);

            if (error) {
                console.error('Erro ao buscar recordes:', error);
                container.innerHTML = '<div style="text-align:center; color:#d32f2f; padding: 10px;">ERRO DE CONEXÃO</div>';
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; padding: 10px;">NENHUM RECORDE AINDA</div>';
                return;
            }

            container.innerHTML = data.map((s, i) => `
                <div class="score-item">
                    <span><span style="color:#888;">${i+1}.</span> <span class="score-name">${s.name}</span></span>
                    <span class="score-val">${s.score}</span>
                </div>
            `).join('');
        };
        
        renderList('solo', 'list-scores-solo');
        renderList('multi', 'list-scores-multi');
    }

    function showHighScores() {
        initAudio(); playSelect();
        renderHighScores();
        switchMenu('menu-highscores');
    }

    async function saveCurrentScore() {
        if (scoreSaved) return;
        initAudio(); playSelect();
        
        const btn = document.getElementById('btn-save-score');
        const input = document.getElementById('player-name-input');
        const statusMsg = document.getElementById('save-status-msg');
        
        const name = input.value.trim().toUpperCase() || 'ANÔNIMO';
        const mode = isSolo ? 'solo' : 'multi';
        const score = currentFinalScore;
        
        btn.innerText = "SALVANDO...";
        btn.disabled = true;

        const { error } = await supabaseClient
            .from('highscores')
            .insert([{ name: name, score: score, mode: mode }]);

        if (error) {
            console.error('Erro ao salvar recorde:', error);
            btn.innerText = "ERRO! TENTAR NOVAMENTE";
            btn.disabled = false;
            return;
        }

        scoreSaved = true;
        btn.style.display = 'none';
        input.style.display = 'none';
        statusMsg.style.display = 'block';
    }

    function showJoinMenu() { initAudio(); switchMenu('menu-client'); }
    function backToMain() { initAudio(); switchMenu('menu-main'); }

    // --- PeerJS / Rede ---
    function setupPeerConnection() {
        conn.on('data', data => {
            if (data.type === 'STATE' && gameState === 'PLAYING') {
                applyRemoteState(data.state);
            } else if (data.type === 'LOBBY_UPDATE') {
                pRemoteState = data.state; updateLobbyUI(); checkBothReady();
            } else if (data.type === 'START_COUNTDOWN') {
                startCountdown();
            } else if (data.type === 'RETURN_LOBBY') {
                returnToLobbyLocal();
            } else if (data.type === 'DISCONNECT') {
                alert("O adversário saiu da sala."); leaveLobby();
            }
        });
        conn.on('close', () => { alert("Conexão perdida."); leaveLobby(); });
    }

    function generateShortId() { return Math.random().toString(36).substring(2, 6).toUpperCase(); }

    function startSolo() {
        initAudio(); playSelect();
        isSolo = true; isHost = true;
        localGame = gameP1; remoteGame = null; pLocalState.ready = false;
        
        document.getElementById('game-container').classList.add('solo-mode');
        document.getElementById('p1-label').innerHTML = "JOGADOR";
        document.getElementById('host-id-container').style.display = 'none';
        document.getElementById('remote-player-card').style.display = 'none';
        
        const btnReady = document.getElementById('btn-ready');
        btnReady.disabled = false; btnReady.innerText = "JOGAR"; btnReady.classList.remove('is-ready');
        document.getElementById('local-status').innerText = "PREPARANDO..."; document.getElementById('local-status').classList.remove('ready');
        
        setTimeout(() => { gameP1.resize(); gameP1.draw(); }, 50);
        switchMenu('menu-lobby'); updateCustomization();
    }

    function hostGame() {
        initAudio(); playSelect();
        isSolo = false;
        document.getElementById('game-container').classList.remove('solo-mode');
        document.getElementById('remote-player-card').style.display = 'block';
        document.getElementById('btn-ready').innerText = "PRONTO";
        
        const customId = "DINO-" + generateShortId();
        peer = new Peer(customId);
        
        peer.on('open', id => {
            isHost = true; localGame = gameP1; remoteGame = gameP2; 
            document.getElementById('p1-label').innerHTML = "VOCÊ"; document.getElementById('p2-label').innerHTML = "INIMIGO";
            document.getElementById('my-peer-id').innerText = id;
            document.getElementById('host-id-container').style.display = 'block';
            switchMenu('menu-lobby'); updateCustomization();
        });

        peer.on('connection', connection => {
            if(conn) { connection.close(); return; }
            conn = connection; setupPeerConnection();
            document.getElementById('remote-status').innerText = "ESPERANDO";
            document.getElementById('remote-status').className = 'status-badge';
            document.getElementById('btn-ready').disabled = false;
            conn.on('open', () => { conn.send({ type: 'LOBBY_UPDATE', state: pLocalState }); });
        });
    }

    function joinGame() {
        initAudio(); playSelect();
        const targetId = document.getElementById('join-id-input').value.trim().toUpperCase();
        if(!targetId) return alert("Digite o código da sala!");
        
        isSolo = false;
        document.getElementById('game-container').classList.remove('solo-mode');
        document.getElementById('remote-player-card').style.display = 'block';
        document.getElementById('btn-ready').innerText = "PRONTO";
        document.getElementById('client-status').innerText = "CONECTANDO...";
        
        peer = new Peer();
        peer.on('open', () => {
            isHost = false; localGame = gameP2; remoteGame = gameP1;
            document.getElementById('p2-label').innerHTML = "VOCÊ"; document.getElementById('p1-label').innerHTML = "INIMIGO";
            
            conn = peer.connect(targetId, { reliable: true });
            conn.on('open', () => {
                setupPeerConnection(); switchMenu('menu-lobby');
                document.getElementById('remote-status').innerText = "ESPERANDO";
                document.getElementById('remote-status').className = 'status-badge';
                document.getElementById('btn-ready').disabled = false;
                updateCustomization();
            });
        });
    }

    function leaveLobby() {
        initAudio(); playSelect(); stopBGM();
        if(conn && conn.open) { conn.send({ type: 'DISCONNECT' }); conn.close(); }
        if(peer) { peer.destroy(); peer = null; }
        conn = null; isSolo = false; gameState = 'MENU';
        switchMenu('menu-main');
        document.getElementById('remote-player-card').style.display = 'block';
    }

    function updateCustomization() {
        pLocalState.color = document.getElementById('local-color').value;
        pLocalState.hat = document.getElementById('local-hat').value;
        if(localGame) { localGame.dino.color = pLocalState.color; localGame.dino.hat = pLocalState.hat; }
        if(conn && conn.open) conn.send({ type: 'LOBBY_UPDATE', state: pLocalState });
    }

    function toggleReady() {
        initAudio(); playSelect();
        if(isSolo) { startCountdown(); return; }

        pLocalState.ready = !pLocalState.ready;
        const btn = document.getElementById('btn-ready');
        const st = document.getElementById('local-status');
        
        if(pLocalState.ready) {
            btn.innerText = "CANCELAR"; btn.classList.add('is-ready');
            st.innerText = "PRONTO"; st.classList.add('ready');
        } else {
            btn.innerText = "PRONTO"; btn.classList.remove('is-ready');
            st.innerText = "ESPERANDO"; st.classList.remove('ready');
        }

        if(conn && conn.open) conn.send({ type: 'LOBBY_UPDATE', state: pLocalState });
        checkBothReady();
    }

    function updateLobbyUI() {
        document.getElementById('remote-color-display').style.backgroundColor = pRemoteState.color;
        document.getElementById('remote-hat-display').innerText = "Chapéu: " + pRemoteState.hat.toUpperCase();
        if(remoteGame) { remoteGame.dino.color = pRemoteState.color; remoteGame.dino.hat = pRemoteState.hat; }

        const st = document.getElementById('remote-status');
        if(pRemoteState.ready) { st.innerText = "PRONTO"; st.classList.add('ready'); } 
        else { st.innerText = "ESPERANDO"; st.classList.remove('ready'); }
    }

    function checkBothReady() {
        if(isHost && pLocalState.ready && pRemoteState.ready) {
            conn.send({ type: 'START_COUNTDOWN' }); startCountdown();
        }
    }

    function startCountdown() {
        gameState = 'COUNTDOWN'; switchMenu(null);
        gameP1.reset(); gameP2.reset();
        
        if (localGame) { localGame.dino.color = pLocalState.color; localGame.dino.hat = pLocalState.hat; }
        if (remoteGame) { remoteGame.dino.color = pRemoteState.color; remoteGame.dino.hat = pRemoteState.hat; }

        const c1 = document.getElementById('countdown-p1'); const c2 = document.getElementById('countdown-p2');
        c1.style.display = 'block'; c2.style.display = 'block';
        
        let count = 3; playSelect();
        const tick = setInterval(() => {
            if(count > 0) {
                c1.innerText = count; c2.innerText = count; playSelect();
                c1.style.transform = 'scale(1.5)'; c2.style.transform = 'scale(1.5)';
                setTimeout(()=> { c1.style.transform='scale(1)'; c2.style.transform='scale(1)'; }, 100);
                count--;
            } else if (count === 0) {
                c1.innerText = "VAI!"; c2.innerText = "VAI!"; playSelect();
                count--;
            } else {
                clearInterval(tick); c1.style.display = 'none'; c2.style.display = 'none';
                gameState = 'PLAYING';
                playBGM(); // Inicia música!
            }
        }, 800);
    }

    function handleGameOver() {
        stopBGM();
        let p1Score = Math.floor(gameP1.score); let p2Score = Math.floor(gameP2.score);
        const winnerMsg = document.getElementById('winner-msg');

        currentFinalScore = Math.floor(localGame.score);
        scoreSaved = false;

        document.getElementById('final-score-display').innerText = currentFinalScore;
        
        const btnSave = document.getElementById('btn-save-score');
        btnSave.style.display = 'inline-block';
        btnSave.innerText = 'SALVAR RECORDE';
        btnSave.disabled = false;

        document.getElementById('player-name-input').style.display = 'inline-block';
        document.getElementById('player-name-input').value = '';
        document.getElementById('save-status-msg').style.display = 'none';

        if (isSolo) {
            winnerMsg.innerText = `FIM DE JOGO!`; winnerMsg.style.color = '#ffeb3b';
        } else {
            if (p1Score > p2Score) {
                winnerMsg.innerText = isHost ? "🏆 VOCÊ VENCEU!" : "💀 VOCÊ FOI DESTRUÍDO!";
                winnerMsg.style.color = isHost ? '#ffeb3b' : '#ff3333';
            } else if (p2Score > p1Score) {
                winnerMsg.innerText = !isHost ? "🏆 VOCÊ VENCEU!" : "💀 VOCÊ FOI DESTRUÍDO!";
                winnerMsg.style.color = !isHost ? '#ffeb3b' : '#ff3333';
            } else {
                winnerMsg.innerText = "🤝 EMPATE!"; winnerMsg.style.color = '#fff';
            }
        }

        setTimeout(() => {
            switchMenu('menu-winner');
            if(isHost) {
                document.getElementById('btn-restart').style.display = 'block';
                document.getElementById('wait-host-msg').style.display = 'none';
            } else {
                document.getElementById('btn-restart').style.display = 'none';
                document.getElementById('wait-host-msg').style.display = 'block';
            }
        }, 2000); // 2 segundos de espera para ver as animações de morte
    }

    function returnToLobby() {
        initAudio(); playSelect();
        if(isHost) {
            if (!isSolo && conn && conn.open) conn.send({ type: 'RETURN_LOBBY' });
            returnToLobbyLocal();
        }
    }

    function returnToLobbyLocal() {
        if(!isSolo && pLocalState.ready) toggleReady();
        switchMenu('menu-lobby'); gameState = 'LOBBY';
        if(isSolo) setTimeout(() => { gameP1.resize(); }, 50);
    }

    function copyId() {
        initAudio(); playSelect();
        const idText = document.getElementById('my-peer-id').innerText;
        if(idText !== "GERANDO...") navigator.clipboard.writeText(idText).then(() => alert("CÓDIGO COPIADO!"));
    }

    // --- Controles Interação ---
    function handleJump() {
        if (gameState === 'PLAYING' && localGame) localGame.dino.jump(localGame);
    }

    function handleSlide() {
        if (gameState === 'PLAYING' && localGame) localGame.dino.slide(localGame);
    }

    let slideKeyDown = false;

    window.addEventListener('keydown', (e) => {
        if (e.code === 'KeyW' || e.code === 'Space' || e.code === 'ArrowUp') {
            if (!e.repeat) handleJump();
        }
        if (e.code === 'KeyS' || e.code === 'ArrowDown') { 
            e.preventDefault(); 
            if (!slideKeyDown) {
                slideKeyDown = true;
                handleSlide(); 
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'KeyS' || e.code === 'ArrowDown') {
            slideKeyDown = false;
        }
    });

    // Mobile Swipe e Tap
    let touchStartY = 0;
    let isSwiping = false;

    window.addEventListener('touchstart', (e) => {
        if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
            e.preventDefault(); 
            touchStartY = e.touches[0].clientY;
            isSwiping = false;
        }
    }, {passive: false});

    window.addEventListener('touchmove', (e) => {
        if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
            e.preventDefault();
            let touchEndY = e.touches[0].clientY;
            // Deslizar para baixo ativa o slide apenas uma vez por swipe
            if (!isSwiping && touchEndY - touchStartY > 40) {
                isSwiping = true;
                handleSlide();
            }
        }
    }, {passive: false});

    window.addEventListener('touchend', (e) => {
        if (!isSwiping) {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
                handleJump();
            }
        }
        isSwiping = false;
    });

    window.addEventListener('mousedown', (e) => {
        if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') handleJump();
    });

    window.addEventListener('resize', () => {
        gameP1.resize(); gameP2.resize();
        if (gameState !== 'PLAYING' && gameState !== 'COUNTDOWN') { gameP1.draw(); gameP2.draw(); }
    });

    gameP1.reset(); gameP2.reset(); gameLoop();
